---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ronin-jobrunner
  labels:
    app.kubernetes.io/name: ronin-jobrunner
    app.kubernetes.io/instance: ronin-jobrunner
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ronin-jobrunner
      app.kubernetes.io/instance: ronin-jobrunner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ronin-jobrunner
        app.kubernetes.io/instance: ronin-jobrunner
    spec:
      containers:
      - name: ronin-jobrunner
        image: ghcr.io/ronin-cg/jobrunner:1.0.42
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: APP_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ronin-jobrunner-secrets
              key: APP_DATABASE_URL
        - name: LAKE_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ronin-jobrunner-secrets
              key: LAKE_DATABASE_URL
        - name: PGBOSS_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ronin-jobrunner-secrets
              key: PGBOSS_DATABASE_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: ronin-jobrunner-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: ronin-jobrunner-secrets
              key: AWS_SECRET_ACCESS_KEY
        envFrom:
        - configMapRef:
            name: ronin-jobrunner-configs
      imagePullSecrets:
      - name: ghcr-login-secret
